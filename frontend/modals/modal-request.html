<div class="modal-backdrop open" id="modal-request-backdrop">
  <div class="modal" style="max-width: 500px; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0;">
    <div class="modal-header" style="padding: 20px 24px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
      <div>
        <h3 style="margin: 0; font-size: 16px; font-weight: 600; color: #0f172a;">Form Permintaan SDM Baru</h3>
        <p style="margin: 4px 0 0 0; font-size: 12px; color: #64748b;">Pengajuan mutasi rotasi antar stasiun kerja klinis</p>
      </div>
      <button onclick="App.closeModal()" style="background: transparent; border: none; font-size: 20px; cursor: pointer; color: #64748b;">&times;</button>
    </div>
    <form id="requestPostForm" onsubmit="RequestModal.submit(event)">
      <div class="modal-body" style="padding: 24px;">
        
        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Divisi Tujuan Penempatan (Target)</label>
          <select id="req-target-division" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
            <option value="">-- Pilih Divisi Target --</option>
          </select>
        </div>

        <div style="margin-bottom: 16px;">
          <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Jumlah Personel Yang Dibutuhkan</label>
          <input type="number" id="req-count" required min="1" value="1" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 8px;">
          <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Justifikasi Kebutuhan Kelayakan</label>
          <textarea id="req-reason" required minlength="10" placeholder="Sebutkan alasan (misal: penambahan kapasitas alat kromatografi baru)..." style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;" rows="3"></textarea>
          <small style="color: #64748b; font-size: 11px; display: block; margin-top: 4px;">Minimal diisi 10 karakter untuk draf pertimbangan.</small>
        </div>

      </div>
      <div class="modal-footer" style="padding: 16px 24px; border-top: 1px solid #e2e8f0; text-align: right; background: #f8fafc;">
        <button type="button" onclick="App.closeModal()" style="padding: 10px 18px; background: white; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 8px;">Batal</button>
        <button type="submit" id="btnSubmitRequest" style="padding: 10px 18px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;">Ajukan Permintaan</button>
      </div>
    </form>
  </div>
</div>

<script>
  var RequestModal = {
    async init() {
      try {
        const response = await fetch('/api/divisions');
        if (response.ok) {
          const divisions = await response.json();
          const select = document.getElementById('req-target-division');
          divisions.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.textContent = `${d.code} - ${d.name}`;
            select.appendChild(opt);
          });
        }
      } catch (e) { console.error(e); }
    },

    async submit(event) {
      event.preventDefault();
      const btn = document.getElementById('btnSubmitRequest');
      btn.disabled = true;
      btn.innerText = 'Mengirimkan...';

      const payload = {
        target_division_id: parseInt(document.getElementById('req-target-division').value),
        needed_count: parseInt(document.getElementById('req-count').value),
        reason: document.getElementById('req-reason').value.trim()
      };

      try {
        const response = await fetch('/api/sdm/requests/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('Peladen menolak draf pengajuan.');

        App.closeModal();
        window.location.reload();
      } catch (error) {
        alert(error.message);
        btn.disabled = false;
        btn.innerText = 'Ajukan Permintaan';
      }
    }
  };

  RequestModal.init();
</script>
